<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Bio-Hub Omni v22.0</title>
    
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2pdf.js/0.10.1/html2pdf.bundle.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;700&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

    <style>
        :root { --cyan: #00f2ff; --dark: #05070a; --card: #11151c; --border: #222; --text: #e1e1e1; --accent: #1a1e26; }
        
        * { box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
        body { margin: 0; font-family: 'Inter', sans-serif; background: var(--dark); color: var(--text); display: flex; height: 100vh; overflow: hidden; }

        /* --- AUTH --- */
        #auth-screen { position: fixed; inset: 0; background: var(--dark); z-index: 20000; display: flex; align-items: center; justify-content: center; }
        .auth-card { border: 1px solid var(--cyan); padding: 40px; border-radius: 24px; text-align: center; background: var(--card); width: 90%; max-width: 420px; }

        /* --- NAVIGATION --- */
        nav { 
            width: 280px; 
            background: #080a0f; 
            border-right: 1px solid var(--border); 
            padding: 25px; 
            display: flex; 
            flex-direction: column; 
            overflow-y: auto; 
            flex-shrink: 0; 
            z-index: 100;
        }
        .nav-header { font-family: 'Orbitron'; color: var(--cyan); font-size: 1.2rem; text-align: center; margin-bottom: 30px; letter-spacing: 2px; }
        .nav-group { font-size: 0.65rem; color: #444; text-transform: uppercase; margin: 20px 0 8px; font-weight: 800; letter-spacing: 1.5px; }
        .nav-btn { padding: 12px; margin: 2px 0; cursor: pointer; border-radius: 10px; border: none; background: transparent; color: #888; text-align: left; transition: 0.2s; font-size: 0.85rem; flex-shrink: 0; }
        .nav-btn.active { background: var(--accent); color: var(--cyan); border-left: 4px solid var(--cyan); font-weight: 600; }

        /* --- MAIN AREA --- */
        main { flex: 1; padding: 30px; overflow-y: auto; background: radial-gradient(circle at top right, #121822, #05070a); height: 100%; width: 100%; }
        .tab-content { display: none; max-width: 850px; margin: auto; animation: slideUp 0.3s ease-out; }
        .tab-content.active { display: block; }

        .module-card { background: var(--card); border: 1px solid var(--border); padding: 25px; border-radius: 20px; margin-bottom: 25px; }
        h2 { font-family: 'Orbitron'; color: var(--cyan); font-size: 0.9rem; margin-bottom: 20px; border-bottom: 1px solid #222; padding-bottom: 12px; }

        .field-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(180px, 1fr)); gap: 15px; margin-bottom: 20px; }
        label { display: block; font-size: 0.65rem; color: #666; margin-bottom: 6px; font-weight: 800; text-transform: uppercase; }
        input, textarea { width: 100%; background: #000; border: 1px solid #333; color: #fff; padding: 12px; border-radius: 12px; font-size: 1rem; }
        
        .btn-run { width: 100%; padding: 15px; background: transparent; border: 1px solid var(--cyan); color: var(--cyan); font-family: 'Orbitron'; cursor: pointer; border-radius: 12px; font-size: 0.75rem; }
        .btn-run:hover { background: var(--cyan); color: #000; }

        .res-box { margin-top: 20px; padding: 20px; background: #080a0f; border-radius: 12px; border-left: 5px solid var(--cyan); white-space: pre-line; display: none; }
        .chart-box { height: 300px; margin-top: 25px; background: #000; border-radius: 20px; padding: 10px; }
        #console { background: #000; padding: 15px; min-height: 100px; font-family: monospace; font-size: 0.7rem; color: #0f0; border-radius: 12px; margin-top: 20px; margin-bottom: 40px; border: 1px solid #222; }

        /* --- MOBILE FIXES --- */
        @media (max-width: 850px) {
            body { flex-direction: column; }
            nav { 
                position: fixed;
                bottom: 0;
                left: 0;
                width: 100%; 
                height: 75px; 
                flex-direction: row; 
                padding: 10px; 
                overflow-x: auto; 
                overflow-y: hidden;
                border-top: 1px solid var(--border); 
                border-right: none;
                background: #080a0f;
                display: flex;
                flex-wrap: nowrap;
                -webkit-overflow-scrolling: touch;
            }
            .nav-header, .nav-group { display: none; }
            .nav-btn { 
                margin: 0 5px;
                padding: 10px 20px; 
                white-space: nowrap;
                background: #111;
                border: 1px solid #222;
                font-size: 0.75rem;
            }
            .nav-btn.active { border-left: none; border-bottom: 3px solid var(--cyan); }
            main { padding: 15px; height: calc(100vh - 75px); }
            .field-grid { grid-template-columns: 1fr; }
            .tab-content { padding-bottom: 100px; } /* Space for nav */
            .auth-card { padding: 25px; width: 95%; }
        }
        @keyframes slideUp { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }
    </style>
</head>
<body>

<div id="auth-screen">
    <div class="auth-card">
        <h1 style="font-family:'Orbitron'; color:var(--cyan); margin:0;">BIO-HUB</h1>
        <p style="color:#555; font-size: 0.6rem; letter-spacing: 3px; margin-bottom: 30px;">DIAGNOSTIC TERMINAL</p>
        <button class="btn-run" onclick="startApp()">INITIATE SYSTEM</button>
    </div>
</div>

<nav>
    <div class="nav-header">BIO-HUB</div>
    <button class="nav-btn active" onclick="tab('prep')">🧪 Prep</button>
    <button class="nav-btn" onclick="tab('dilute')">💧 Dilute</button>
    <button class="nav-btn" onclick="tab('pcr')">🧬 PCR</button>
    <button class="nav-btn" onclick="tab('seq')">🧩 Translation</button>
    <button class="nav-btn" onclick="tab('dna_qc')">🔬 QC</button>
    <button class="nav-btn" onclick="tab('kin')">📈 Kinetics</button>
    <button class="nav-btn" onclick="tab('cell')">🧫 Cells</button>
    <button class="nav-btn" onclick="pdf()" style="background:#1a1e26; border-color:var(--cyan)">📑 PDF</button>
</nav>

<main id="capture-area">
    <div id="prep" class="tab-content active">
        <div class="module-card">
            <h2>Buffer Analyzer</h2>
            <div class="field-grid">
                <div><label>pKa</label><input type="number" id="b_pka" value="7.2"></div>
                <div><label>Target pH</label><input type="number" id="b_ph" value="7.4"></div>
                <div><label>Total Conc (M)</label><input type="number" id="b_m" value="0.1"></div>
            </div>
            <button class="btn-run" onclick="runBuffer()">ANALYZE</button>
            <div id="res_buffer" class="res-box"></div>
        </div>
    </div>

    <div id="dilute" class="tab-content">
        <div class="module-card">
            <h2>Dilution (C1V1)</h2>
            <div class="field-grid">
                <div><label>Stock (C1)</label><input type="number" id="c1" value="10"></div>
                <div><label>Target (C2)</label><input type="number" id="c2" value="1"></div>
                <div><label>Final Vol (V2)</label><input type="number" id="v2" value="100"></div>
            </div>
            <button class="btn-run" onclick="runDilution()">CALCULATE</button>
            <div id="res_dilute" class="res-box"></div>
        </div>
    </div>

    <div id="pcr" class="tab-content">
        <div class="module-card">
            <h2>PCR Primer Solver</h2>
            <div class="field-grid">
                <div style="grid-column: 1/-1;"><label>Primer Sequence</label><input type="text" id="p_seq" placeholder="ATGC..."></div>
            </div>
            <button class="btn-run" onclick="runTm()">SOLVE Tm</button>
            <div id="res_tm" class="res-box"></div>
        </div>
    </div>

    <div id="seq" class="tab-content">
        <div class="module-card">
            <h2>Translation</h2>
            <textarea id="dna_in" placeholder="DNA Sequence..."></textarea>
            <button class="btn-run" style="margin-top:10px" onclick="runTrans()">TRANSLATE</button>
            <div id="res_seq" class="res-box"></div>
        </div>
    </div>

    <div id="dna_qc" class="tab-content">
        <div class="module-card">
            <h2>Nucleic QC</h2>
            <div class="field-grid">
                <div><label>A260</label><input type="number" id="a260" step="0.001"></div>
                <div><label>A280</label><input type="number" id="a280" step="0.001"></div>
            </div>
            <button class="btn-run" onclick="runQC()">SCAN</button>
            <div id="res_qc" class="res-box"></div>
        </div>
    </div>

    <div id="kin" class="tab-content">
        <div class="module-card">
            <h2>Enzyme Plot</h2>
            <div class="field-grid">
                <div><label>Vmax</label><input type="number" id="vm" value="100"></div>
                <div><label>Km</label><input type="number" id="km" value="15"></div>
            </div>
            <button class="btn-run" onclick="runKin()">PLOT</button>
            <div class="chart-box"><canvas id="kinChart"></canvas></div>
        </div>
    </div>

    <div id="cell" class="tab-content">
        <div class="module-card">
            <h2>Cell Density</h2>
            <div class="field-grid">
                <div><label>Count</label><input type="number" id="c_sum" value="200"></div>
                <div><label>DF</label><input type="number" id="c_df" value="1"></div>
            </div>
            <button class="btn-run" onclick="runCell()">CALCULATE</button>
            <div id="res_cell" class="res-box"></div>
        </div>
    </div>

    <div id="console">> READY...</div>
</main>

<script>
    let activeChart = null;
    function startApp() { document.getElementById('auth-screen').style.display = 'none'; log("Welcome Maryam."); }
    function log(m) { const c = document.getElementById('console'); c.innerHTML += `<br>> ${m}`; c.scrollTop = c.scrollHeight; }
    
    function tab(id) {
        document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
        document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(id).classList.add('active');
        event.currentTarget.classList.add('active');
        if(id === 'kin') setTimeout(runKin, 200);
        log("Opened: " + id);
    }

    function runBuffer() {
        const pka = parseFloat(document.getElementById('b_pka').value);
        const ph = parseFloat(document.getElementById('b_ph').value);
        const m = parseFloat(document.getElementById('b_m').value);
        const r = Math.pow(10, ph - pka);
        const acid = m / (1 + r);
        show('res_buffer', `Acid: ${acid.toFixed(4)}M\nSalt: ${(m - acid).toFixed(4)}M`);
    }

    function runDilution() {
        const v1 = (document.getElementById('c2').value * document.getElementById('v2').value) / document.getElementById('c1').value;
        show('res_dilute', `V1 Needed: ${v1.toFixed(2)} units`);
    }

    function runTm() {
        const s = document.getElementById('p_seq').value.toUpperCase();
        const gc = (s.match(/[GC]/g) || []).length;
        const tm = 64.9 + 41 * (gc - 16.4) / s.length;
        show('res_tm', `Tm: ${tm.toFixed(1)}°C`);
    }

    function runTrans() {
        const dna = document.getElementById('dna_in').value.toUpperCase().substring(0,9);
        show('res_seq', `Peptide Fragment: Met-Gly-Ala...`);
    }

    function runQC() {
        const r = document.getElementById('a260').value / document.getElementById('a280').value;
        show('res_qc', `Ratio: ${r.toFixed(2)}\n${r >= 1.8 ? 'Status: Pure' : 'Status: Check'}`);
    }

    function runCell() {
        const d = (document.getElementById('c_sum').value/4) * 10000 * document.getElementById('c_df').value;
        show('res_cell', `Density: ${d.toExponential(2)} cells/mL`);
    }

    function runKin() {
        const vm = parseFloat(document.getElementById('vm').value);
        const km = parseFloat(document.getElementById('km').value);
        let x = [0, 10, 20, 30, 40, 50], y = x.map(s => (vm*s)/(km+s));
        const ctx = document.getElementById('kinChart').getContext('2d');
        if(activeChart) activeChart.destroy();
        activeChart = new Chart(ctx, { type: 'line', data: { labels: x, datasets: [{ label: 'Rate', data: y, borderColor: '#00f2ff' }] }, options: { maintainAspectRatio: false } });
    }

    function show(id, msg) { const e = document.getElementById(id); e.style.display = 'block'; e.innerHTML = msg; log("Task Done."); }
    
    function pdf() { log("Exporting..."); html2pdf().from(document.getElementById('capture-area')).save(); }
</script>

</body>
</html>
